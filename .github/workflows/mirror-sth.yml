name: Mirror Stairway to Hell archive

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Scrape only — skip the S3 upload"
        type: boolean
        required: true
        default: true
      aws_region:
        description: "AWS region for the bucket"
        type: string
        required: false
        default: us-east-1

jobs:
  mirror:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Scrape STH into ./mirror
        run: node tools/mirror-sth.js --out mirror

      - name: Show mirror summary
        run: |
          echo "Top-level manifest:"
          cat mirror/manifest.json
          echo
          echo "On-disk size:"
          du -sh mirror
          echo "Object count:"
          find mirror -type f | wc -l

      - name: Configure AWS credentials
        if: ${{ !inputs.dry_run }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Sync immutable archive blobs
        if: ${{ !inputs.dry_run }}
        run: |
          aws s3 sync mirror/ s3://bbc.xania.org/archive/sth/ \
            --no-progress \
            --cache-control "public, max-age=31536000, immutable" \
            --metadata-directive REPLACE \
            --exclude "*manifest.json" \
            --exclude "meta/*"

      - name: Sync manifests and meta files
        if: ${{ !inputs.dry_run }}
        run: |
          aws s3 sync mirror/ s3://bbc.xania.org/archive/sth/ \
            --no-progress \
            --cache-control "public, max-age=300" \
            --metadata-directive REPLACE \
            --exclude "*" \
            --include "*manifest.json" \
            --include "meta/*"
